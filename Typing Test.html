<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=windows-1252">
        
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Niven Teaches Typing For No Reason</title>
        <style>
                * {
    padding: 0;
    margin: 0;
    font-family: arial;
}

body {
    text-align: center;
    background-color: darkgreen;
}

h1 {
    color: white;
    font-size: 40px;
    margin: 20px;
}

.correct {
    color: green;
}

.incorrect {
    color: red;
}

.untyped:first-letter {
    text-decoration: underline;
}

#text {
    display: flex;
    justify-content: center;
    background-color: white;
    padding: 60px;
}

span {
    white-space: pre;
}

button {
    margin: 20px;
    padding: 10px;
    font-size: 24px;
    background-color: white;
}

#wpm {
    font-size: 30px;
}

        </style>
    </head>
    <body>

        <h1>Niven Teaches Typing For No Reason</h1>
        <button onclick="startTest()">Start Test</button>
        <h2 id="text">
            <span class="correct"></span>
            <span class="incorrect"></span>
            <span class="untyped"></span>
        </h2>
        <p id="wpm"></p>
        <script>
                let examples = [
    'This is going to be an somewhat long sentence because I am extremely teaching hoe to type this.',
    'This is the only short sentences',
    'faehfioijdlkjvshbehufewgwe ivefnvknwreijf',
    'lahf.jfblsdcjsljckblrihucoewnfliurew;ohfnjewlicnfrhw rn',
    'ailuhnvigcowa;rkfwiloslaekglieofihguyi'
];

let correctArray = [];
let incorrectArray = [];
let untypedArray = [];
let correctSpan = document.querySelector('.correct');
let incorrectSpan = document.querySelector('.incorrect');
let untypedSpan = document.querySelector('.untyped');
let wpmEl = document.getElementById('wpm');

let letterTyped = 0;
let startTime;

function startTest() {
    resetTest();

    document.onkeydown = typeTest;
    startTime = new Date();
    document.querySelector('button').disabled = true;
    let textToType = examples[Math.floor(Math.random() * examples.length)];

    untypedArray = textToType.split('');
    untypedSpan.innerHTML = textToType;
}

function typeTest(event) {
    if (event.key.length < 2) {
        checkLetter(event);
    } else if (event.key === 'Backspace' && incorrectArray.length > 0) {
        untypedArray.unshift(incorrectArray.pop());
    }
    printToScreen();
}

function checkLetter(event) {
    let letter = event.key;
    if (event.shiftKey) {
        letter = letter.toUpperCase();
    }
    if (letter === untypedArray[0] && incorrectArray.length === 0) {
        correctArray.push(untypedArray.shift());
        letterTyped++;
        checkFinished();
    } else {
        incorrectArray.push(untypedArray.shift());
    }
}

function printToScreen() {
    correctSpan.innerHTML = correctArray.join('');

    incorrectSpan.innerHTML = incorrectArray.join('');

    untypedSpan.innerHTML = untypedArray.join('');

    let timeElapsed = (new Date() - startTime) / 1000;
    let wordsTyped = letterTyped / 4;
    let wpm = Math.floor((wordsTyped / timeElapsed) * 60);
    wpmEl.innerHTML = 'WPM: ' + wpm;
}

function checkFinished() {
    if(untypedArray.length === 0 && incorrectArray.length === 0){
        document.onkeydown = null;
        document.querySelector("button").disabled = false;
    }
}

function resetTest() {
    letterTyped = 0;
    correctArray = [];
    incorrectArray = [];
    untypedArray = [];
    correctSpan.innerHTML = '';
    incorrectSpan.innerHTML = '';
    untypedSpan.innerHTML = '';
    wpmEl.innerHTML = '';
}

        </script>


</body></html>
